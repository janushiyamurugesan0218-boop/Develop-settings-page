<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings</title>
    <style>
        /* Color variables for easy theme switching */
        :root {
            --bg-color: #f4f6f9;
            --card-bg: #ffffff;
            --text-color: #333333;
            --text-muted: #666666;
            --border-color: #e0e0e0;
            --accent-color: #4a90e2;
            --accent-hover: #357abd;
        }

        /* Dark Mode variables */
        [data-theme="dark"] {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #f5f5f5;
            --text-muted: #aaaaaa;
            --border-color: #333333;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            transition: background-color 0.3s, color 0.3s;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .settings-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 500px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
        }

        h2 {
            margin-bottom: 8px;
            font-size: 24px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .settings-section {
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border-color);
        }

        .settings-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .settings-label {
            font-weight: 600;
            font-size: 16px;
        }

        .settings-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        /* Styling for select dropdowns */
        select {
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }

        /* iOS style toggle switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .3s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 18px;
            width: 18px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background-color: var(--accent-color);
        }

        input:checked + .slider:before {
            transform: translateX(24px);
        }

        .btn-save {
            width: 100%;
            padding: 12px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-save:hover {
            background-color: var(--accent-hover);
        }

        .toast {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #2ed573;
            display: none;
        }
    </style>
</head>
<body>

    <div class="settings-container">
        <h2>Settings</h2>
        <p class="subtitle">Manage your application preferences</p>

        <div class="settings-section">
            <div class="settings-row">
                <div>
                    <div class="settings-label">Dark Mode</div>
                    <div class="settings-desc">Switch between light and dark themes</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="dark-mode-toggle">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-row">
                <div>
                    <div class="settings-label">Email Notifications</div>
                    <div class="settings-desc">Receive weekly updates and activity logs</div>
                </div>
                <label class="switch">
                    <input type="checkbox" id="notifications-toggle" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="settings-section">
            <div class="settings-row">
                <div>
                    <div class="settings-label">Account Privacy</div>
                    <div class="settings-desc">Choose who can view your profile</div>
                </div>
                <select id="privacy-select">
                    <option value="public">Public</option>
                    <option value="friends">Friends Only</option>
                    <option value="private">Private</option>
                </select>
            </div>
        </div>

        <button class="btn-save" id="save-settings-btn">Save Settings</button>
        <div class="toast" id="save-toast">Preferences saved successfully!</div>
    </div>

    <script src="settings.js"></script>
</body>
</html>
